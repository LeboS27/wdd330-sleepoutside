<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="product-detail">
        <h3>Brand</h3>
        <h2 class="divider">Product Name</h2>
        <img class="divider" src="" alt="product image" />
        <p class="product-card__price">$0.00</p>
        <p class="product__color">Color</p>
        <p class="product__description">Description</p>
        <div class="product-detail__add">
          <button id="addToCart" data-id="">Add to Cart</button>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="/js/product.js" type="module"></script>
  </body>
</html>
